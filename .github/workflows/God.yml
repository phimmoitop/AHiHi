name: Ultimate M3U8 Decryptor

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          pip install pycryptodome requests

      - name: Advanced Link Repair & Key Setup
        shell: python
        run: |
          import os
          import requests
          import re

          # 1. Tải file m3u8 gốc
          m3u8_url = "https://vicdn.cc/tt/1.m3u8"
          print(f"Downloading playlist from {m3u8_url}")
          r = requests.get(m3u8_url)
          content = r.text

          # 2. Tạo file key nhị phân (16 bytes)
          # Key cố định của bạn: 223e4393fe559da5
          with open("video.key", "wb") as kf:
              kf.write(b"223e4393fe559da5")

          # 3. Sửa nội dung M3U8
          # Thay đổi link Key trỏ về file nội bộ
          content = re.sub(r'URI="[^"]+"', 'URI="video.key"', content)

          # Sửa link segment: Biến .jpg/.jpeg thành .woff2 (link thật của KingCDN)
          # Đây là bước quan trọng nhất để tránh lỗi 404
          content = content.replace(".jpg", ".woff2")
          content = content.replace(".jpeg", ".woff2")
          content = content.replace(".svg", ".woff2")
          content = content.replace(".png", ".woff2")

          with open("final.m3u8", "w") as f:
              f.write(content)
          print("Playlist fixed and saved as final.m3u8")

      - name: FFmpeg Download & Decrypt
        run: |
          # Chạy FFmpeg với playlist đã được sửa link thật
          # Sử dụng Header để tránh bị server chặn
          ffmpeg -allowed_extensions ALL \
            -protocol_whitelist file,http,https,tcp,tls,crypto \
            -headers "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"$'\r\n'"Referer: https://vicdn.cc/" \
            -i final.m3u8 \
            -c copy "Phim_Da_Giai_Ma.mp4" \
            -loglevel warning

      - name: Upload Video
        uses: actions/upload-artifact@v4
        with:
          name: Video_Output
          path: Phim_Da_Giai_Ma.mp4
          retention-days: 1
