name: M3U8 Download

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link'
        required: true
      slug:
        description: 'Slug'
        required: true
      token:
        description: 'Token'
        required: true
      page:
        description: 'Pages'
        required: true
      account:
        description: 'Account'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg aria2 curl jq
          python3 -m pip install -U yt-dlp

      - name: Download + Verify M3U8 Video
        shell: bash
        run: |
          set -e

          URL="${{ github.event.inputs.link }}"

          echo "Getting real m3u8..."
          M3U8=$(yt-dlp -g "$URL")
          
          # Lấy Base URL để ghép nếu segment là đường dẫn tương đối
          BASE_URL=$(echo "$M3U8" | sed 's/\/[^\/]*$/\//')

          curl -sL "$M3U8" -o playlist.m3u8

          grep -v '^#' playlist.m3u8 | grep -v '^[[:space:]]*$' > segments.txt
          grep "#EXTINF" playlist.m3u8 | awk -F: '{print $2}' | sed 's/,//' > durations.txt

          TOTAL=$(wc -l < segments.txt)
          echo "Total segments: $TOTAL"

          mkdir -p segments
          mapfile -t SEGS < segments.txt
          mapfile -t DURS < durations.txt

          download_segment() {
            IDX=$1
            SEG="${SEGS[$IDX]}"
            EXPECT="${DURS[$IDX]}"

            FILE=$(printf "segments/seg_%05d.ts" "$IDX")

            # Xử lý URL: Nếu SEG có http thì dùng luôn, nếu không thì ghép với BASE_URL
            if [[ "$SEG" == http* ]]; then
              FULL="$SEG"
            else
              # Đảm bảo không bị trùng dấu gạch chéo
              SEG_CLEAN=$(echo "$SEG" | sed 's/^\///')
              FULL="${BASE_URL}${SEG_CLEAN}"
            fi

            ATTEMPT=0
            MAX_RETRIES=25

            while [ "$ATTEMPT" -lt "$MAX_RETRIES" ]; do
              # Thêm tham số ngẫu nhiên để tránh cache của server nếu cần
              RAND=$RANDOM
              FINAL_URL="${FULL}"
              if [[ "$FULL" == *\?* ]]; then
                FINAL_URL="${FULL}&v=$RAND"
              else
                FINAL_URL="${FULL}?v=$RAND"
              fi

              echo "[SEG $IDX] attempt $ATTEMPT"

              if [ $ATTEMPT -lt 10 ]; then
                aria2c --quiet=true --file-allocation=none -o "$FILE.tmp" "$FINAL_URL" || true
              elif [ $ATTEMPT -lt 20 ]; then
                curl -L "$FINAL_URL" -o "$FILE.tmp" || true
              else
                yt-dlp -o "$FILE.tmp" "$FINAL_URL" || true
              fi

              if [ ! -f "$FILE.tmp" ]; then
                ATTEMPT=$((ATTEMPT+1))
                sleep 3
                continue
              fi

              SIZE=$(stat -c%s "$FILE.tmp")
              if [ "$SIZE" -lt 10000 ]; then
                echo "[SEG $IDX] file too small ($SIZE)"
                rm -f "$FILE.tmp"
                ATTEMPT=$((ATTEMPT+1))
                continue
              fi

              ffprobe -v error "$FILE.tmp" >/dev/null 2>&1 || {
                echo "[SEG $IDX] ffprobe failed"
                rm -f "$FILE.tmp"
                ATTEMPT=$((ATTEMPT+1))
                continue
              }

              DUR=$(ffprobe -v error \
                -show_entries format=duration \
                -of default=noprint_wrappers=1:nokey=1 "$FILE.tmp" || echo "0")

              DUR=${DUR%.*}
              EXP=${EXPECT%.*}
              DIFF=$(echo "$DUR $EXP" | awk '{print ($1>$2)?$1-$2:$2-$1}')

              if [ "$DIFF" -gt 2 ]; then
                echo "[SEG $IDX] duration mismatch expected=$EXP actual=$DUR"
                rm -f "$FILE.tmp"
                ATTEMPT=$((ATTEMPT+1))
                continue
              fi

              mv "$FILE.tmp" "$FILE"
              echo "[SEG $IDX] OK duration=$DUR"
              return 0
            done

            echo "[ERROR] segment $IDX failed completely"
            touch segments/FAILED_CRITICAL
            return 1
          }

          echo "Starting parallel download..."
          for ((i=0;i<TOTAL;i++)); do
            download_segment "$i" &
            while [ "$(jobs -p | wc -l)" -ge 10 ]; do
              sleep 1
            done
          done

          wait

          if [ -f segments/FAILED_CRITICAL ]; then
            echo "Critical segment failed"
            exit 1
          fi

          echo "Checking segment durations..."
          TOTAL_ACTUAL=0
          for f in segments/*.ts; do
            D=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$f" || echo 0)
            D=${D%.*}
            TOTAL_ACTUAL=$((TOTAL_ACTUAL + D))
          done

          EXPECTED=$(grep "#EXTINF" playlist.m3u8 | awk -F: '{sum+=$2} END{print int(sum)}')
          echo "Expected duration: $EXPECTED"
          echo "Actual duration (segments): $TOTAL_ACTUAL"

          echo "Merging segments..."
          cat segments/*.ts > combined.ts

          echo "Rebuilding video..."
          ffmpeg -loglevel error -y \
            -fflags +genpts+discardcorrupt \
            -err_detect ignore_err \
            -i combined.ts \
            -map 0:v? -map 0:a? \
            -c:v copy \
            -c:a aac \
            -af aresample=async=1 \
            input_video.mp4

          rm combined.ts

          echo "Final duration..."
          ACTUAL=$(ffprobe -v error \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            input_video.mp4)

          ACTUAL=${ACTUAL%.*}
          DIFF=$(echo "$EXPECTED $ACTUAL" | awk '{print ($1>$2)?$1-$2:$2-$1}')

          echo "Expected: $EXPECTED"
          echo "Actual: $ACTUAL"
          echo "Diff: $DIFF"

          if [ "$DIFF" -gt 10 ]; then
            echo "[ERROR] duration mismatch too large"
            exit 1
          fi

          echo "Video verified successfully"
          echo "Collecting video information..."
          SIZE=$(du -h input_video.mp4 | cut -f1)
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 input_video.mp4 || echo "N/A")
          BITRATE=$(ffprobe -v error -show_entries format=bit_rate -of default=noprint_wrappers=1:nokey=1 input_video.mp4 || echo "N/A")
          WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of csv=p=0 input_video.mp4 | head -n1 || echo "N/A")
          HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 input_video.mp4 | head -n1 || echo "N/A")
          FPS=$(ffprobe -v error -select_streams v:0 -show_entries stream=r_frame_rate -of csv=p=0 input_video.mp4 | head -n1 || echo "N/A")
          CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of csv=p=0 input_video.mp4 | head -n1 || echo "N/A")

          echo "================ VIDEO INFO ================"
          echo "File: input_video.mp4"
          echo "Size: $SIZE"
          echo "Duration: $DURATION seconds"
          echo "Resolution: ${WIDTH}x${HEIGHT}"
          echo "FPS: $FPS"
          echo "Codec: $CODEC"
          echo "Bitrate: $BITRATE"
          echo "==========================================="
          
      - name: Convert to HLS fMP4 (Copy Video & Encode Audio)
        run: |
          mkdir -p output
          SLUG="${{ github.event.inputs.slug }}"
          
          echo "==========================================="
          echo "PHƯƠNG THỨC: COPY VIDEO (NO ENCODE)"
          echo "ENCODE AUDIO: AAC 128k"
          echo "FORMAT: HLS fMP4 (.png extension)"
          echo "==========================================="
          
          # Chạy FFMPEG: 
          # -c:v copy -> Giữ nguyên định dạng video gốc (không tốn CPU)
          # -c:a aac -> Encode lại âm thanh để đảm bảo tương thích
          # -hls_flags independent_segments -> Rất quan trọng khi dùng 'copy' để mỗi segment bắt đầu bằng Keyframe
          
          ffmpeg -y -stats_period 30 -i input_video.mp4 \
          -map 0:v:0 -map 0:a? \
          -c:v copy \
          -c:a aac -b:a 96k -ac 2 -ar 48000 \
          -f hls \
          -start_number 10001 \
          -hls_time 5 \
          -hls_list_size 0 \
          -hls_flags independent_segments \
          -hls_segment_type fmp4 \
          -hls_fmp4_init_filename "${SLUG}-index.png" \
          -hls_segment_filename "output/${SLUG}-index%d.png" \
          "output/${SLUG}.m3u8"
          
          # Kiểm tra xem file m3u8 có được tạo không
          if [ ! -f "output/${SLUG}.m3u8" ]; then
            echo "FFmpeg failed to create m3u8"
            exit 1
          fi

          echo "==========================================="
          echo "CHUYỂN ĐỔI HOÀN TẤT"
          ls -lh output/
          echo "==========================================="

      - name: Deploy to Cloudflare Pages (first)
        id: deploy1
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}

      - name: Verify Cloudflare deployment (branch domain check)
        id: verify
        continue-on-error: true
        env:
          PROJECT: ${{ github.event.inputs.page }}
          BRANCH: ${{ github.event.inputs.slug }}
        run: |
          set -e
          FILE_URL="https://${{ github.event.inputs.slug }}.${{ github.event.inputs.page }}.pages.dev/${{ github.event.inputs.slug }}.m3u8"

          echo "[TARGET] $FILE_URL"

          check () {
            code=$(curl -L -o /dev/null -s -w "%{http_code}" "$FILE_URL")
            echo "HTTP CODE: $code"
            [ "$code" = "200" ]
          }

          echo "[WAIT] Waiting 1 minutes for Pages propagation..."
          sleep 60

          echo "[CHECK #1]"
          if check; then
            echo "[SUCCESS] File exists"
            curl -G "https://cp.ssplay.net/vicdn.php" \
            --data-urlencode "type=ok0" \
            --data-urlencode "key=${{ github.event.inputs.page }}" \
            --data-urlencode "slug=${{ github.event.inputs.slug }}"
            exit 0
          fi

          echo "[WAIT] Still not found, wait extra 3 minutes..."
          sleep 180

          echo "[CHECK #2]"
          if check; then
            echo "[SUCCESS] File exists after delay"
            exit 0
          fi

          echo "[FAIL] File still missing → mark for redeploy"
          echo "NEED_REDEPLOY=true" >> $GITHUB_ENV
          exit 1

      - name: Deploy to Cloudflare Pages (retry – reuse encoded files)
        if: env.NEED_REDEPLOY == 'true'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.token }}
          accountId: ${{ github.event.inputs.account }}
          projectName: ${{ github.event.inputs.page }}
          directory: ./output
          branch: ${{ github.event.inputs.slug }}
